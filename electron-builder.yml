appId: com.clipboard-history.app
productName: "小明剪贴板"
copyright: Copyright 2026

directories:
  output: dist
  buildResources: resources

files:
  - "out/**/*"
  - "!**/*.ts"
  - "!**/*.map"

win:
  target:
    - target: nsis
      arch: [x64]
  icon: resources/icon.ico

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: "小明剪贴板"
  uninstallDisplayName: "小明剪贴板"
